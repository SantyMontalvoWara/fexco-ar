<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./marcador.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="modeloAuto" src="./auto.glb"></a-asset-item>
        <video id="vid1" src="./video1.mp4" autoplay loop muted playsinline webkit-playsinline></video>
        <video id="vid2" src="./video2.mp4" autoplay loop muted playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid1" position="0 0 0" width="1" height="0.5" rotation="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-video src="#vid2" position="0 0 0" width="1" height="0.5" rotation="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model rotation="-90 0 0" position="0 0 0" scale="0.5 0.5 0.5" src="#modeloAuto"></a-gltf-model>
      </a-entity>
      
    </a-scene>
  </body>
</html>
